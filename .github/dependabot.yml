version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    groups:
      github-actions:
        patterns:
          - "*"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
      semver-major-days: 7
      semver-minor-days: 3
      semver-patch-days: 2
